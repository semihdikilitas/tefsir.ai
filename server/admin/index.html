<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tefsir AI - Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#f0ead6;min-height:100vh}
header{background:#141414;border-bottom:1px solid rgba(212,175,55,.2);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{color:#D4AF37;font-size:20px}
.tabs{display:flex;gap:4px;padding:12px 24px;background:#0f0f0f}
.tab-btn{padding:8px 20px;border:1px solid rgba(212,175,55,.2);border-radius:8px;background:transparent;color:#f0ead6;cursor:pointer;font-size:13px}
.tab-btn.active{background:rgba(212,175,55,.15);border-color:#D4AF37;color:#D4AF37}
.content{padding:24px;max-width:1200px;margin:0 auto}
.toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center}
.btn{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary{background:#D4AF37;color:#000}
.btn-danger{background:#D90429;color:#fff}
.btn-outline{background:transparent;border:1px solid rgba(212,175,55,.3);color:#D4AF37}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px;border-bottom:1px solid rgba(212,175,55,.15);color:#D4AF37;font-size:12px;text-transform:uppercase}
td{padding:12px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:100;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-content{background:#141414;border:1px solid rgba(212,175,55,.2);border-radius:16px;padding:24px;width:90%;max-width:560px;max-height:80vh;overflow-y:auto}
.modal h3{color:#D4AF37;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;color:rgba(240,234,214,.6);font-size:12px;margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px;background:#0a0a0a;border:1px solid rgba(212,175,55,.15);border-radius:8px;color:#f0ead6;font-size:13px}
.form-group textarea{min-height:80px;resize:vertical}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px}
.status-free{background:rgba(42,157,143,.2);color:#2A9D8F}
.status-premium{background:rgba(212,175,55,.2);color:#D4AF37}
#loginScreen{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0a0a0a}
#loginBox{background:#141414;border:1px solid rgba(212,175,55,.2);border-radius:16px;padding:40px;width:90%;max-width:400px;text-align:center}
#loginBox h1{color:#D4AF37;margin-bottom:8px}
#loginBox p{color:rgba(240,234,214,.4);font-size:13px;margin-bottom:24px}
#loginBox input{width:100%;padding:12px;background:#0a0a0a;border:1px solid rgba(212,175,55,.2);border-radius:10px;color:#f0ead6;font-size:14px;text-align:center;margin-bottom:12px}
#loginBox .error{color:#D90429;font-size:12px;margin-bottom:8px}
#appScreen{display:none}
</style>
</head>
<body>
<!-- Login Screen -->
<div id="loginScreen">
<div id="loginBox">
<h1>⚜ Tefsir AI</h1>
<p>Icerik Yonetim Paneli</p>
<input type="password" id="passwordInput" placeholder="Sifre" onkeydown="if(event.key==='Enter')login()">
<div class="error" id="loginError"></div>
<button class="btn btn-primary" onclick="login()" style="width:100%">Giris Yap</button>
</div>
</div>

<!-- App Screen -->
<div id="appScreen">
<header>
<h1>⚜ Tefsir AI</h1>
<span style="color:rgba(240,234,214,.4);font-size:12px">Icerik Yonetim Paneli</span>
</header>
<div class="tabs">
<button class="tab-btn active" data-tab="wallpapers">Duvar Kagitlari</button>
<button class="tab-btn" data-tab="verses">Ayetler</button>
<button class="tab-btn" data-tab="hadiths">Hadisler</button>
<button class="tab-btn" data-tab="prayers">Dualar</button>
</div>
<div class="content" id="content"></div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="modalTitle"></h3>
<form id="modalForm"></form>
<div class="form-actions">
<button class="btn btn-outline" onclick="closeModal()">Iptal</button>
<button class="btn btn-primary" onclick="saveItem()">Kaydet</button>
</div>
</div>
</div>

<script>
let AUTH = sessionStorage.getItem('admin_pw') || '';
const API = '/api';
let currentTab = 'wallpapers';
let editingId = null;

function authHeaders() {
  return { 'X-Admin-Password': AUTH, 'Content-Type': 'application/json' };
}

function login() {
  const pw = document.getElementById('passwordInput').value;
  if (!pw) return;
  fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw}) })
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        AUTH = pw;
        sessionStorage.setItem('admin_pw', pw);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        load();
      } else {
        document.getElementById('loginError').textContent = 'Hatali sifre';
      }
    });
}

// Auto-login
if (AUTH) {
  fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:AUTH}) })
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        load();
      } else {
        sessionStorage.removeItem('admin_pw');
        AUTH = '';
      }
    });
}

const fields = {
  wallpapers: [
    {key:'asset',label:'Dosya Adi',type:'text'},
    {key:'imageUrl',label:'Resim URL',type:'text'},
    {key:'category',label:'Kategori',type:'text'},
    {key:'verseText',label:'Ayet Metni',type:'textarea'},
    {key:'surahName',label:'Sure Adi',type:'text'},
    {key:'verseNumbers',label:'Ayet No',type:'text'},
    {key:'isPremium',label:'Premium',type:'checkbox'},
  ],
  verses: [
    {key:'text',label:'Ayet Metni',type:'textarea'},
    {key:'surahName',label:'Sure Adi',type:'text'},
    {key:'verseNumbers',label:'Ayet No',type:'text'},
  ],
  hadiths: [
    {key:'text',label:'Hadis Metni',type:'textarea'},
    {key:'source',label:'Kaynak',type:'text'},
    {key:'category',label:'Kategori',type:'text'},
    {key:'arabic',label:'Arapca Metin',type:'textarea'},
  ],
  prayers: [
    {key:'title',label:'Dua Adi',type:'text'},
    {key:'category',label:'Kategori',type:'text'},
    {key:'arabic',label:'Arapca Metin',type:'textarea'},
    {key:'transliteration',label:'Okunusu',type:'text'},
    {key:'text',label:'Dua Metni',type:'textarea'},
    {key:'note',label:'Not',type:'text'},
  ],
};

async function load() {
  const res = await fetch(`${API}/${currentTab}`);
  const data = await res.json();
  renderTable(data);
}

function renderTable(data) {
  const el = document.getElementById('content');
  if (!data.length) {
    el.innerHTML = '<p style="color:rgba(240,234,214,.4)">Henuz icerik eklenmemis.</p><br><button class="btn btn-primary" onclick="openAdd()">+ Yeni Ekle</button>';
    return;
  }
  const cols = fields[currentTab].map(f => f.label);
  let html = '<div class="toolbar"><button class="btn btn-primary" onclick="openAdd()">+ Yeni Ekle</button>';
  html += '<button class="btn btn-outline" onclick="document.getElementById(\'fileInput\').click()">📷 Resim Yukle</button>';
  html += '<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadImage(this)">';
  html += '<span id="uploadStatus" style="font-size:11px;color:rgba(240,234,214,.4)"></span></div>';
  html += '<table><thead><tr><th></th>';
  cols.forEach(c => html += `<th>${c}</th>`);
  html += '<th></th></tr></thead><tbody>';
  data.forEach(item => {
    html += '<tr>';
    html += '<td>' + (item.isPremium ? '<span class="status status-premium">Premium</span>' : '<span class="status status-free">Ucretsiz</span>') + '</td>';
    fields[currentTab].forEach(f => {
      let val = item[f.key] || '';
      if (typeof val === 'boolean') val = val ? '✓' : '✗';
      if (typeof val === 'string' && val.length > 40) val = val.substring(0,40) + '...';
      html += `<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${val || '-'}</td>`;
    });
    html += `<td style="text-align:right">
      <button class="btn btn-outline" style="padding:4px 12px;margin-right:4px" onclick="openEdit('${item.id}')">Duzenle</button>
      <button class="btn btn-danger" style="padding:4px 12px" onclick="deleteItem('${item.id}')">Sil</button>
    </td></tr>`;
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

async function openAdd() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Yeni Ekle';
  document.getElementById('modalForm').innerHTML = buildForm({});
  document.getElementById('modal').classList.add('show');
}

async function openEdit(id) {
  editingId = id;
  const res = await fetch(`${API}/${currentTab}/${id}`);
  const item = await res.json();
  document.getElementById('modalTitle').textContent = 'Duzenle';
  document.getElementById('modalForm').innerHTML = buildForm(item);
  document.getElementById('modal').classList.add('show');
}

function buildForm(item) {
  return fields[currentTab].map(f => {
    if (f.type === 'checkbox') {
      return `<div class="form-group"><label>${f.label}</label>
        <input type="checkbox" ${item[f.key] ? 'checked' : ''} name="${f.key}"></div>`;
    }
    if (f.type === 'textarea') {
      return `<div class="form-group"><label>${f.label}</label>
        <textarea name="${f.key}">${item[f.key] || ''}</textarea></div>`;
    }
    return `<div class="form-group"><label>${f.label}</label>
      <input type="text" name="${f.key}" value="${item[f.key] || ''}"></div>`;
  }).join('');
}

async function saveItem() {
  const form = document.getElementById('modalForm');
  const fd = new FormData(form);
  const body = {};
  for (let [k, v] of fd.entries()) {
    const field = fields[currentTab].find(f => f.key === k);
    if (field && field.type === 'checkbox') {
      body[k] = form.querySelector(`[name="${k}"]`).checked;
    } else {
      body[k] = v;
    }
  }
  const method = editingId ? 'PUT' : 'POST';
  const url = editingId ? `${API}/${currentTab}/${editingId}` : `${API}/${currentTab}`;
  const resp = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
  if (resp.status === 401) { alert('Oturum suresi doldu. Yeniden giris yapin.'); location.reload(); return; }
  closeModal();
  load();
}

async function deleteItem(id) {
  if (!confirm('Silmek istediginize emin misiniz?')) return;
  const resp = await fetch(`${API}/${currentTab}/${id}`, { method:'DELETE', headers: authHeaders() });
  if (resp.status === 401) { alert('Oturum suresi doldu.'); location.reload(); return; }
  load();
}

function closeModal() { document.getElementById('modal').classList.remove('show'); editingId = null; }

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentTab = this.dataset.tab;
    load();
  });
});

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

async function uploadImage(input) {
  const file = input.files[0];
  if (!file) return;
  const st = document.getElementById('uploadStatus');
  st.textContent = 'Yukleniyor...';
  const fd = new FormData();
  fd.append('image', file);
  const resp = await fetch('/api/upload', { method:'POST', headers:{'X-Admin-Password': AUTH}, body: fd });
  const data = await resp.json();
  if (data.url) {
    st.textContent = '✓ Yüklendi! URL kopyalandi';
    navigator.clipboard.writeText(window.location.origin + data.url);
  } else {
    st.textContent = 'Hata!';
  }
}
</script>
</body>
</html>
